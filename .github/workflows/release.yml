name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      TARGET: x86_64-unknown-linux-musl
      ARCHIVE: agent-terrace-linux-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches package version
        if: github.event_name == 'push'
        shell: bash
        run: |
          package_version="$(sed -n 's/^version = "\([^"]*\)"/\1/p' Cargo.toml | head -n 1)"
          test -n "$package_version"
          test "${GITHUB_REF_NAME}" = "v${package_version}"

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: client
        run: bun install --frozen-lockfile

      - name: Check and build frontend
        working-directory: client
        run: |
          bun run fmt:check
          bun run lint
          bun run test
          bun run build

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ env.TARGET }}
          components: rustfmt, clippy

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install --yes musl-tools

      - name: Check backend
        run: |
          cargo fmt --check
          cargo clippy --all-targets --all-features -- -D warnings
          cargo test --locked

      - name: Build backend
        run: cargo build --release --locked --target "${TARGET}"

      - name: Package release
        shell: bash
        run: |
          staging="$(mktemp -d)"
          mkdir -p "$staging/client"
          cp "target/${TARGET}/release/agent-terrace" "$staging/agent-terrace"
          cp -a client/dist "$staging/client/dist"
          tar -czf "$ARCHIVE" -C "$staging" agent-terrace client
          sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent-terrace-linux-x86_64
          path: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.ARCHIVE }}
            ${{ env.ARCHIVE }}.sha256
